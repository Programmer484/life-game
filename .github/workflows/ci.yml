name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable pnpm
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Ratchet baseline: make origin/main resolvable in the shallow checkout.
      # A failed fetch fails CI loudly — RATCHET_REQUIRE below would fail
      # anyway, this just fails earlier with the real error.
      - name: Fetch ratchet baseline
        run: git fetch origin main --depth=1

      # Same gate as local `pnpm verify` — one exit code. RATCHET_REQUIRE
      # makes a missing baseline an error instead of a skip-pass.
      - name: Verify
        run: pnpm verify
        env:
          RATCHET_REQUIRE: '1'

  # Framework self-tests (enforcement probes + verify meta-tests in test/**).
  # Not part of `pnpm verify` — they plant probes in the live repo and spawn
  # nested verify runs, which races feature work. Run only when framework
  # files change (always on pushes to main as a post-merge safety net).
  framework:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect framework changes
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git fetch origin "${{ github.base_ref }}" --depth=1
          # Tree diff (two refs, no merge base) — works in shallow checkouts;
          # the PR checkout is a merge of base+head, so this is exactly the PR's changes.
          if git diff --name-only "origin/${{ github.base_ref }}" HEAD \
            | grep -qE '^(scripts/|test/|\.claude/|\.github/|eslint\.config\.js|vitest.*\.config\.ts|module-map|package\.json|pnpm-lock\.yaml|knip\.json|stryker\.config|lefthook\.yml|tsconfig\.json)'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Enable pnpm
        if: steps.changed.outputs.run == 'true'
        run: corepack enable

      - uses: actions/setup-node@v4
        if: steps.changed.outputs.run == 'true'
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        if: steps.changed.outputs.run == 'true'
        run: pnpm install --frozen-lockfile

      - name: Framework tests
        if: steps.changed.outputs.run == 'true'
        run: pnpm test:framework

  # CI-only: mutation testing is too slow for the local `pnpm verify` gate.
  mutation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable pnpm
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Mutation test
        run: pnpm mutation
